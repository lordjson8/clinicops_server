<!DOCTYPE html>
<html>
  <head>
    {% block head %}
    <title>{{ title|default:"ClinicOps API" }}</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% if favicon_href %}<link rel="icon" href="{{ favicon_href }}">{% endif %}
    <link rel="stylesheet" href="{{ swagger_ui_css }}">
    <style>
      html { box-sizing: border-box; overflow-y: scroll; }
      *, *:after, *:before { box-sizing: inherit; }
      body { background: #fafafa; margin: 0; }

      /* ── Custom header bar ── */
      .custom-header {
        background: linear-gradient(135deg, #1a5632 0%, #2d7a4a 100%);
        color: #fff;
        padding: 14px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        position: sticky;
        top: 0;
        z-index: 1000;
      }
      .custom-header .header-left {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .custom-header .header-logo {
        font-size: 24px;
        font-weight: 700;
        letter-spacing: -0.5px;
      }
      .custom-header .header-logo span {
        color: #a3d9b1;
        font-weight: 400;
      }
      .custom-header .header-version {
        background: rgba(255,255,255,0.15);
        padding: 3px 10px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: 500;
      }
      .custom-header .header-right {
        display: flex;
        align-items: center;
        gap: 16px;
        font-size: 13px;
      }
      .custom-header .header-right a {
        color: #a3d9b1;
        text-decoration: none;
        transition: color 0.2s;
      }
      .custom-header .header-right a:hover {
        color: #fff;
      }
      .custom-header .env-badge {
        background: #e8a838;
        color: #1a1a1a;
        padding: 3px 10px;
        border-radius: 12px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
      }

      /* ── Hide default Swagger top bar ── */
      .swagger-ui .topbar { display: none; }

      /* ── Subtle tweaks ── */
      .swagger-ui .info { margin: 20px 0 10px; }
      .swagger-ui .info .title { font-size: 24px; }
    </style>
    {% endblock head %}
  </head>
  <body>
    {% block body %}
    <div class="custom-header">
      <div class="header-left">
        <div class="header-logo">ClinicOps <span>API</span></div>
        <div class="header-version">v1.0.0</div>
      </div>
      <div class="header-right">
        <span class="env-badge">Dev</span>
        <a href="/api/schema/" target="_blank">OpenAPI JSON</a>
        <a href="/api/schema/redoc/" target="_blank">ReDoc</a>
        <a href="/admin/" target="_blank">Admin</a>
      </div>
    </div>
    <div id="swagger-ui"></div>
    <script src="{{ swagger_ui_bundle }}"></script>
    <script src="{{ swagger_ui_standalone }}"></script>
    {% if script_url %}
    <script src="{{ script_url }}"></script>
    {% else %}
    <script>
    {% include template_name_js %}
    </script>
    {% endif %}
    {% endblock %}
  </body>
</html>
